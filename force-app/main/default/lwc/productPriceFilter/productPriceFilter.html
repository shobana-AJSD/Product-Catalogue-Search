<template>
    <lightning-card title="Product Catalogue">

        <div class="slds-p-around_medium">
            <lightning-input type="range" name="input5" label="Price range ($300-$20000)" min="500" max="20000" value="500" onchange={onPriceChange}></lightning-input>
            
            <template lwc:if={productsFound}>
                  <div class="slds-m-top_small">
                     Showing Products with Price Range:  $300 - ${value}
                  </div>
                
            <div class="slds-m-top_large slds-grid slds-wrap slds-gutters">
                <template for:each={filteredProducts} for:item="product">

                    <div key={product.id}
                         class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">

                        <div class="product-card">

                            <img src={product.image}
                                 alt={product.name}
                                 class="product-image"/>

                            <h2 class="slds-text-heading_small slds-m-top_small">
                                {product.name}
                            </h2>

                            <p class="slds-text-color_weak">
                                {product.category}
                            </p>

                            <h3 class="price">
                                ₹{product.price}
                            </h3>

                        </div>

                    </div>

                </template>
                 </div>
               </template>
                <template lwc:else>
                    <div class="slds-text-heading_large slds-align_absolute-center">
                       No Products Found
                    </div>
                </template>
                
            </div>
 
       

    </lightning-card>
</template>
